controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    rps_hand_controller:
      type: joint_trajectory_controller/JointTrajectoryController

rps_hand_controller:
  ros__parameters:
    joints:
      - servo_a_joint
      - servo_b_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.5
      servo_a_joint:
        trajectory: 0.2
        goal: 0.1
      servo_b_joint:
        trajectory: 0.2
        goal: 0.1
